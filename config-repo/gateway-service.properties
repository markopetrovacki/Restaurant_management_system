
# APPLICATION
spring.application.name=gateway-service


# SERVER
server.port=8080


# EUREKA (Service Discovery)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


# GATEWAY - ROUTES

# USER SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# RESTAURANT SERVICE
spring.cloud.gateway.routes[1].id=restaurant-service
spring.cloud.gateway.routes[1].uri=lb://RESTAURANT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/restaurants/**

# RESERVATION SERVICE
spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=lb://RESERVATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/reservations/**

# REVIEW SERVICE
spring.cloud.gateway.routes[3].id=review-service
spring.cloud.gateway.routes[3].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/reviews/**

# NOTIFICATION SERVICE
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/notifications/**

# RESTAURANT COMPOSITE SERVICE
spring.cloud.gateway.routes[5].id=restaurant-composite-service
spring.cloud.gateway.routes[5].uri=lb://RESTAURANT-COMPOSITE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/composite/**


# ACTUATOR (opciono ali korisno)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


# LOGGING
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO